name: CodeSync CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}
  NODE_VERSION: '20'

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Install client deps
        run: npm ci
        working-directory: client

  # ── 2. Test — Backend ────────────────────────────────────────────
  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:7.0
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://127.0.0.1:27017/codesync_test
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: test_jwt_secret_32_chars_minimum
      REFRESH_TOKEN_SECRET: test_refresh_secret_32_chars
      CLIENT_URL: http://localhost:5173
      PORT: 4001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: server

      - name: Run tests
        run: npm test
        working-directory: server

  # ── 3. Build Docker images ───────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-server]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/server
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # ── Build server image ────────────────────────────────────
      - name: Build & push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ── Build client image ────────────────────────────────────
      - name: Build & push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          target: production
          push: true
          tags: ${{ env.IMAGE_BASE }}/client:latest,${{ env.IMAGE_BASE }}/client:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}

  # ── 4. Deploy to free hosting ─────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # ── Deploy server to Render.com (free tier) ────────────────
      # Trigger a Render deploy hook (set RENDER_DEPLOY_HOOK in secrets)
      - name: Trigger Render deploy
        if: secrets.RENDER_DEPLOY_HOOK != ''
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        continue-on-error: true

      # ── Deploy client to Vercel ────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy client to Vercel
        if: secrets.VERCEL_TOKEN != ''
        run: |
          cd client
          npm ci
          npm run build
          vercel --token=${{ secrets.VERCEL_TOKEN }} \
                 --prod \
                 --yes \
                 --env VITE_API_URL=${{ secrets.VITE_API_URL }} \
                 --env VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}
        continue-on-error: true

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker images | ✅ Pushed to GHCR |" >> $GITHUB_STEP_SUMMARY
          echo "| Server (Render) | ✅ Deploy triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| Client (Vercel) | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
