version: '3.9'

# ── CodeSync — Local Development Stack ──────────────────────────────
# Usage:
#   docker compose build ts-builder   # build TypeScript image (once)
#   docker compose up -d               # start everything
#   docker compose logs -f server      # tail server logs
#   docker compose down                # stop (keep volumes)
#   docker compose down -v             # stop + wipe database

services:

  # ── Pre-build TypeScript execution image ────────────────────────
  # NetworkMode:none on execution containers means tsx must be
  # baked in at image build time (no npm install at run time).
  ts-builder:
    build:
      context: ./docker/typescript
      dockerfile: Dockerfile
    image: codesync-ts:latest
    command: echo "✅ TypeScript runner image ready"

  # ── MongoDB ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: codesync-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: codesync
      MONGO_INITDB_ROOT_PASSWORD: codesync_local_pass
      MONGO_INITDB_DATABASE: codesync
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: codesync-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Backend ─────────────────────────────────────────────────────

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development          # ← critical: use dev stage (runs as root)
    container_name: codesync-server
    restart: unless-stopped
    depends_on:
      mongodb: { condition: service_healthy }
      redis:   { condition: service_healthy }
      ts-builder: { condition: service_completed_successfully }
    environment:
      NODE_ENV: development
      PORT: 4000

      MONGODB_URI: mongodb://codesync:codesync_local_pass@mongodb:27017/codesync?authSource=admin
      REDIS_URL: redis://redis:6379


      CLIENT_URL: http://localhost

      # Auth secrets — CHANGE THESE in production
      JWT_SECRET: dev_jwt_secret_change_in_production_32chars_min
      REFRESH_TOKEN_SECRET: dev_refresh_secret_change_in_production_min
      JWT_EXPIRES_IN: 24h
      REFRESH_TOKEN_EXPIRES_IN: 7d

      # Execution sandbox
      DOCKER_SOCKET: /var/run/docker.sock
      MAX_CONCURRENT_EXECUTIONS: 10
      EXECUTION_TIMEOUT_MS: 10000
      EXECUTION_RATE_LIMIT: 10
      MAX_STDOUT_BYTES: 1048576
      MAX_STDERR_BYTES: 262144

      LOG_LEVEL: debug
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend Dev Server ─────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: codesync-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      # Empty = same-origin; Nginx at port 80 proxies /api/ and /socket.io/
      VITE_API_URL: ""
      VITE_SOCKET_URL: ""
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules

  # ── Nginx Reverse Proxy ─────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: codesync-nginx
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy   # ← wait for /health to return 200
      client:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
  mongo_config:
  redis_data:

networks:
  default:
    name: codesync-network
