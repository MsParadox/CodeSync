# ── CodeSync — Production reverse proxy (TLS termination) ────────
# Topology:
#   Internet ──▶ this nginx (443/80)
#       ├── /            ──▶ client:80    (built static SPA)
#       ├── /api/        ──▶ server:4000
#       └── /socket.io/  ──▶ server:4000  (WebSocket upgrade)
#
# Replace codesync.example.com with your domain, then obtain certs with
# certbot (see docs/DEPLOY.md). For Cloudflare-proxied TLS you can serve
# only port 80 below (Cloudflare terminates TLS at its edge).

upstream codesync_api { server server:4000; keepalive 32; }
upstream codesync_web { server client:80;   keepalive 16; }

# ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────
server {
  listen 80;
  server_name codesync.example.com;

  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

# ── HTTPS ────────────────────────────────────────────────────────
server {
  listen 443 ssl;
  http2 on;
  server_name codesync.example.com;

  ssl_certificate     /etc/letsencrypt/live/codesync.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/codesync.example.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Frame-Options          SAMEORIGIN;
  add_header X-Content-Type-Options   nosniff;
  add_header Referrer-Policy          strict-origin-when-cross-origin;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
  gzip_min_length 1024;

  client_max_body_size 5m;

  location /api/ {
    proxy_pass         http://codesync_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_read_timeout 200s;   # first run may pull a language image
    proxy_buffering    off;
  }

  location /socket.io/ {
    proxy_pass         http://codesync_api;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_read_timeout 86400s;
    proxy_buffering    off;
  }

  location /health { proxy_pass http://codesync_api/health; access_log off; }

  location / {
    proxy_pass         http://codesync_web;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
  }
}
