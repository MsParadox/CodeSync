# ── CodeSync Nginx Config — Development / Single-server production
# Handles: HTTP → API proxy, WebSocket upgrade, SPA routing

upstream codesync_api {
  server server:4000;
  keepalive 32;
}

# Redirect HTTP to HTTPS in production (comment out for dev)
# server {
#   listen 80;
#   server_name codesync.example.com;
#   return 301 https://$host$request_uri;
# }

server {
  listen 80;
  server_name localhost;

  # Security headers
  add_header X-Frame-Options          SAMEORIGIN;
  add_header X-Content-Type-Options   nosniff;
  add_header X-XSS-Protection        "1; mode=block";
  add_header Referrer-Policy          strict-origin-when-cross-origin;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # ── API Routes ─────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://codesync_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # Disable buffering for streaming responses
    proxy_buffering off;
  }

  # ── WebSocket (Socket.io) ──────────────────────────────────────
  location /socket.io/ {
    proxy_pass         http://codesync_api;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;   # Keep socket open 24 hours
    proxy_buffering    off;
  }

  # ── Health check ───────────────────────────────────────────────
  location /health {
    proxy_pass http://codesync_api/health;
    access_log off;
  }

  # ── Static React SPA ───────────────────────────────────────────
  # In dev, proxy to Vite dev server
  location / {
    proxy_pass         http://client:5173;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";  # Vite HMR WebSocket
    proxy_set_header   Host       $host;
  }
}
